<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 가족 가계부</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root {
  --bg:#0f0f13; --surface:#16161e; --card:#1c1c26; --border:#2a2a38;
  --accent:#7c6af7; --accent2:#f7a56a; --accent3:#6af7b8;
  --text:#e8e8f0; --muted:#6b6b80; --danger:#f76a6a; --success:#6af7b8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(124,106,247,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,106,247,0.04) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.wrapper{position:relative;z-index:1;max-width:1420px;margin:0 auto;padding:28px 20px;}
header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:32px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.header-left h1{font-size:2rem;font-weight:900;letter-spacing:-0.04em;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.header-left p{color:var(--muted);font-size:0.8rem;margin-top:3px;font-family:'DM Mono',monospace;}
.month-tabs{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.month-tab{padding:5px 12px;border-radius:20px;cursor:pointer;font-size:0.78rem;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--muted);transition:all .2s;}
.month-tab:hover{border-color:var(--accent);color:var(--accent);}
.month-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
nav{display:flex;gap:4px;margin-bottom:24px;}
.nav-btn{padding:7px 18px;border-radius:8px;cursor:pointer;font-size:0.83rem;font-weight:500;border:1px solid transparent;background:transparent;color:var(--muted);transition:all .2s;}
.nav-btn:hover{color:var(--text);background:var(--surface);}
.nav-btn.active{background:var(--card);border-color:var(--border);color:var(--text);}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px;}
.summary-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;transition:transform .2s;}
.summary-card:hover{transform:translateY(-2px);}
.sc-label{font-size:0.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}
.sc-value{font-size:1.4rem;font-weight:700;font-family:'DM Mono',monospace;}
.sc-sub{font-size:0.73rem;color:var(--muted);margin-top:4px;}
.c-income .sc-value{color:#6af7b8;} .c-expense .sc-value{color:#f76a6a;} .c-savings .sc-value{color:var(--accent);} .c-rate .sc-value{color:var(--accent2);}
.main-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;}
.chart-card h3{font-size:0.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;}
.full-width{grid-column:1/-1;}
.cat-list{display:flex;flex-direction:column;gap:9px;}
.cat-item{display:flex;align-items:center;gap:10px;}
.cat-name{font-size:0.78rem;width:68px;color:var(--text);flex-shrink:0;}
.cat-bar-wrap{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.cat-bar{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.cat-val{font-size:0.75rem;font-family:'DM Mono',monospace;color:var(--muted);width:76px;text-align:right;flex-shrink:0;}
.txn-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
.txn-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.txn-header h3{font-size:0.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.btn-add{display:flex;align-items:center;gap:5px;padding:5px 14px;border-radius:7px;background:rgba(124,106,247,0.15);border:1px solid rgba(124,106,247,0.3);color:var(--accent);font-size:0.8rem;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-add:hover{background:rgba(124,106,247,0.25);}
.txn-table{width:100%;border-collapse:collapse;}
.txn-table th{font-size:0.7rem;color:var(--muted);text-align:left;padding:7px 10px;border-bottom:1px solid var(--border);font-weight:500;text-transform:uppercase;letter-spacing:.06em;}
.txn-table td{padding:9px 10px;font-size:0.81rem;border-bottom:1px solid rgba(42,42,56,0.5);}
.txn-table tr:last-child td{border-bottom:none;}
.txn-table tbody tr:hover td{background:rgba(124,106,247,0.04);}
.tag{display:inline-block;padding:2px 7px;border-radius:4px;font-size:0.68rem;font-weight:500;white-space:nowrap;}
.amt-cell{font-family:'DM Mono',monospace;text-align:right;color:#f76a6a;}
.action-cell{text-align:right;white-space:nowrap;}
.btn-edit-row,.btn-del-row{padding:3px 8px;border-radius:5px;font-size:0.7rem;font-weight:500;cursor:pointer;border:none;transition:all .2s;}
.btn-edit-row{background:rgba(124,106,247,0.12);color:var(--accent);}
.btn-edit-row:hover{background:rgba(124,106,247,0.25);}
.btn-del-row{background:rgba(247,106,106,0.1);color:#f76a6a;margin-left:4px;}
.btn-del-row:hover{background:rgba(247,106,106,0.22);}
.income-section{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:18px;}
.income-section h3{font-size:0.78rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}
.income-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
.income-item{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
.income-item label{font-size:0.72rem;color:var(--muted);font-weight:500;display:block;margin-bottom:5px;}
.income-num{font-size:1.05rem;font-weight:700;font-family:'DM Mono',monospace;color:#6af7b8;cursor:pointer;border:none;background:transparent;width:100%;outline:none;}
.income-num:focus{border-bottom:1px solid var(--accent);}
.income-add{background:var(--surface);border:1px dashed var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:0.8rem;cursor:pointer;transition:all .2s;}
.income-add:hover{border-color:var(--accent);color:var(--accent);}
.annual-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.month-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:all .2s;}
.month-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.month-card.has-data{border-color:rgba(124,106,247,0.3);}
.mc-month{font-size:0.72rem;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.06em;}
.mc-income{font-size:.95rem;font-weight:700;color:#6af7b8;font-family:'DM Mono',monospace;margin-top:3px;}
.mc-expense{font-size:.82rem;color:#f76a6a;font-family:'DM Mono',monospace;}
.mc-rate{font-size:.72rem;color:var(--muted);margin-top:5px;}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:7px;overflow:hidden;}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .6s;}
.asset-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
.asset-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;}
.ac-type{font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.ac-val{font-size:1.15rem;font-weight:700;font-family:'DM Mono',monospace;cursor:pointer;transition:opacity .15s;}
.ac-val:hover{opacity:.75;}
.ac-input{font-size:1.1rem;font-weight:700;font-family:'DM Mono',monospace;background:transparent;border:none;border-bottom:1px solid var(--accent);color:inherit;width:100%;outline:none;}
.ac-sub{font-size:0.73rem;color:var(--muted);margin-top:4px;}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:1000;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px;width:420px;max-width:95vw;animation:slideUp .22s ease;}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{font-size:1rem;font-weight:700;margin-bottom:20px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:0.73rem;color:var(--muted);font-weight:500;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;}
.form-group input,.form-group select{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:0.88rem;font-family:'Noto Sans KR',sans-serif;outline:none;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus{border-color:var(--accent);}
.form-group select option{background:var(--surface);}
.modal-btns{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;}
.btn-cancel{padding:8px 18px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:0.83rem;}
.btn-save{padding:8px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:0.83rem;font-weight:600;}
.btn-save:hover{background:#6a57e8;}
.toast{position:fixed;bottom:28px;right:28px;background:var(--accent);color:#fff;padding:10px 18px;border-radius:10px;font-size:0.83rem;font-weight:500;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;}
.toast.show{opacity:1;}
.editable-cell{cursor:pointer;border-radius:4px;transition:background .15s;}
.editable-cell:hover{background:rgba(124,106,247,0.1);}
.section-title{font-size:1rem;font-weight:700;margin-bottom:14px;margin-top:4px;display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.page{display:none;} .page.active{display:block;}
.tag-관리비{background:rgba(106,247,184,.12);color:#6af7b8;}
.tag-가스비{background:rgba(247,165,106,.12);color:#f7a56a;}
.tag-유류비{background:rgba(155,247,165,.12);color:#9bf7a5;}
.tag-여행{background:rgba(124,106,247,.15);color:#b49ff5;}
.tag-장보기{background:rgba(106,184,247,.12);color:#6ab8f7;}
.tag-카페{background:rgba(247,106,200,.12);color:#f76ac8;}
.tag-외식{background:rgba(247,159,106,.12);color:#f79f6a;}
.tag-배달{background:rgba(247,214,106,.12);color:#f7d66a;}
.tag-의료{background:rgba(247,106,106,.15);color:#f76a6a;}
.tag-생활용품{background:rgba(106,247,232,.12);color:#6af7e8;}
.tag-미용{background:rgba(247,106,180,.12);color:#f76ab4;}
.tag-의류잡화{background:rgba(192,106,247,.12);color:#c06af7;}
.tag-문화생활{background:rgba(160,247,106,.12);color:#a0f76a;}
.tag-기타취미{background:rgba(247,197,106,.12);color:#f7c56a;}
.tag-구독{background:rgba(122,122,247,.12);color:#7a7af7;}
.tag-경조사{background:rgba(247,106,138,.12);color:#f76a8a;}
.tag-보험{background:rgba(138,247,106,.08);color:#8af76a;}
.tag-기타{background:rgba(150,150,150,.12);color:#aaa;}
@media(max-width:900px){.summary-grid{grid-template-columns:repeat(2,1fr);}.main-grid{grid-template-columns:1fr;}.annual-grid{grid-template-columns:repeat(2,1fr);}.asset-grid{grid-template-columns:repeat(2,1fr);}header{flex-direction:column;align-items:flex-start;gap:14px;}}
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="header-left">
      <h1>2026 가족 가계부</h1>
      <p>FAMILY · BUDGET · TRACKER · 현진 &amp; 유한 — 클릭하면 바로 수정 가능</p>
    </div>
    <div class="month-tabs" id="monthTabs"></div>
  </header>
  <nav>
    <button class="nav-btn active" onclick="showPage('monthly')">월별 내역</button>
    <button class="nav-btn" onclick="showPage('annual')">연간 요약</button>
    <button class="nav-btn" onclick="showPage('assets')">자산 현황</button>
  </nav>

  <!-- MONTHLY -->
  <div id="page-monthly" class="page active">
    <div class="income-section">
      <h3>이달 소득 — 금액 클릭해서 수정 가능</h3>
      <div class="income-grid" id="incomeGrid"></div>
    </div>
    <div class="summary-grid">
      <div class="summary-card c-income"><div class="sc-label">이달 소득</div><div class="sc-value" id="m-income">—</div><div class="sc-sub" id="m-income-sub"></div></div>
      <div class="summary-card c-expense"><div class="sc-label">이달 지출</div><div class="sc-value" id="m-expense">—</div><div class="sc-sub" id="m-expense-sub"></div></div>
      <div class="summary-card c-savings"><div class="sc-label">이달 잔액</div><div class="sc-value" id="m-savings">—</div><div class="sc-sub" id="m-savings-sub"></div></div>
      <div class="summary-card c-rate"><div class="sc-label">지출 비율</div><div class="sc-value" id="m-rate">—</div><div class="sc-sub">소득 대비 지출</div></div>
    </div>
    <div class="main-grid">
      <div class="chart-card"><h3>소비 분류별 지출</h3><div class="cat-list" id="catList"></div></div>
      <div class="chart-card"><h3>카테고리 비율</h3><canvas id="donutChart" height="220"></canvas></div>
    </div>
    <div class="txn-section">
      <div class="txn-header">
        <h3>지출 내역 <span id="txnCount" style="color:var(--accent);font-family:'DM Mono',monospace;margin-left:4px;"></span></h3>
        <button class="btn-add" onclick="openAddModal()">＋ 지출 추가</button>
      </div>
      <table class="txn-table">
        <thead><tr><th>No.</th><th>거래일</th><th>내용</th><th>분류</th><th style="text-align:right">금액</th><th style="text-align:right">수정 / 삭제</th></tr></thead>
        <tbody id="txnBody"></tbody>
      </table>
    </div>
  </div>

  <!-- ANNUAL -->
  <div id="page-annual" class="page">
    <div class="summary-grid">
      <div class="summary-card c-income"><div class="sc-label">연간 총소득</div><div class="sc-value" id="a-income">—</div></div>
      <div class="summary-card c-expense"><div class="sc-label">연간 총지출</div><div class="sc-value" id="a-expense">—</div><div class="sc-sub" id="a-esub"></div></div>
      <div class="summary-card c-savings"><div class="sc-label">연간 잔액</div><div class="sc-value" id="a-savings">—</div></div>
      <div class="summary-card c-rate"><div class="sc-label">평균 지출비율</div><div class="sc-value" id="a-rate">—</div><div class="sc-sub">기록된 달 기준</div></div>
    </div>
    <div class="chart-card full-width" style="margin-bottom:18px"><h3>월별 소득 vs 지출</h3><canvas id="barChart" height="90"></canvas></div>
    <div class="section-title">월별 요약</div>
    <div class="annual-grid" id="annualGrid"></div>
  </div>

  <!-- ASSETS -->
  <div id="page-assets" class="page">
    <p style="font-size:0.8rem;color:var(--muted);margin-bottom:14px;">💡 금액을 클릭하면 바로 수정할 수 있어요</p>
    <div class="asset-grid" id="assetGrid"></div>
    <div class="chart-card"><h3>자산 구성</h3><canvas id="assetChart" height="90"></canvas></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">지출 추가</h2>
    <div class="form-group"><label>거래일</label><input type="text" id="f-date" placeholder="예: 4/5"></div>
    <div class="form-group"><label>내용</label><input type="text" id="f-desc" placeholder="예: 마트 장보기"></div>
    <div class="form-group"><label>금액 (원)</label><input type="number" id="f-amt" placeholder="예: 35000"></div>
    <div class="form-group"><label>분류</label>
      <select id="f-cat">
        <option>관리비</option><option>가스비</option><option>유류비</option><option>여행</option>
        <option>장보기</option><option>카페</option><option>외식</option><option>배달</option>
        <option>의료</option><option>생활용품</option><option>미용</option><option>의류/잡화</option>
        <option>문화생활</option><option>기타취미</option><option>구독</option><option>경조사</option>
        <option>보험</option><option>기타</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveModal()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MONTH_LIST=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const ALL_CATS=['관리비','가스비','유류비','여행','장보기','카페','외식','배달','의료','생활용품','미용','의류/잡화','문화생활','기타취미','구독','경조사','보험','기타'];
const CAT_COLORS={관리비:'#6af7b8',가스비:'#f7a56a',유류비:'#9bf7a5',여행:'#b49ff5',장보기:'#6ab8f7',카페:'#f76ac8',외식:'#f79f6a',배달:'#f7d66a',의료:'#f76a6a',생활용품:'#6af7e8',미용:'#f76ab4','의류/잡화':'#c06af7',문화생활:'#a0f76a',기타취미:'#f7c56a',구독:'#7a7af7',경조사:'#f76a8a',보험:'#8af76a',기타:'#aaa'};
const ASSET_COLORS={현금:'#6af7b8',주식:'#b49ff5',외화:'#f7a56a',부동산:'#6ab8f7'};
const ASSET_ICONS={현금:'💵',주식:'📈',외화:'💱',부동산:'🏠'};

const DATA={

function fmt(n){if(!n)return'0';if(Math.abs(n)>=100000000)return(n/100000000).toFixed(1)+'억';if(Math.abs(n)>=10000)return Math.round(n/10000)+'만';return n.toLocaleString();}
function fmtFull(n){return n?n.toLocaleString()+'원':'0원';}
function totalIncome(m){return Object.values(DATA.months[m].income).reduce((a,b)=>a+b,0);}
function totalExpense(m){return DATA.months[m].txns.reduce((a,t)=>a+t.amt,0);}
function getCats(m){const c={};ALL_CATS.forEach(k=>c[k]=0);DATA.months[m].txns.forEach(t=>{const k=ALL_CATS.includes(t.cat)?t.cat:'기타';c[k]+=t.amt;});return c;}
function tagClass(cat){return'tag tag-'+(cat||'기타').replace('/','');}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),2200);}

let currentMonth='3월';
let donutChart=null,barChart=null,assetChart=null,editIdx=null;

function buildTabs(){
  const wrap=document.getElementById('monthTabs');
  MONTH_LIST.forEach(m=>{const b=document.createElement('button');b.className='month-tab'+(m===currentMonth?' active':'');b.textContent=m;b.onclick=()=>selectMonth(m);wrap.appendChild(b);});
}
function selectMonth(m){
  currentMonth=m;
  document.querySelectorAll('.month-tab').forEach((b,i)=>b.classList.toggle('active',MONTH_LIST[i]===m));
  renderMonthly();
}

function renderMonthly(){
  const d=DATA.months[currentMonth];
  const inc=totalIncome(currentMonth),exp=totalExpense(currentMonth);
  const sav=inc-exp,rate=inc>0?exp/inc:0;

  // income grid
  const ig=document.getElementById('incomeGrid');ig.innerHTML='';
  Object.entries(d.income).forEach(([k,v])=>{
    const div=document.createElement('div');div.className='income-item';
    div.innerHTML=`<label>${k}</label><input class="income-num" type="number" value="${v}" onchange="updateIncome('${currentMonth}','${k}',this.value)" onblur="this.value=DATA.months['${currentMonth}'].income['${k}']">`;
    ig.appendChild(div);
  });
  const addDiv=document.createElement('div');addDiv.className='income-add';addDiv.textContent='＋ 소득 항목 추가';addDiv.onclick=()=>addIncomeItem(currentMonth);
  ig.appendChild(addDiv);

  document.getElementById('m-income').textContent=fmt(inc)+'원';
  document.getElementById('m-income-sub').textContent='소득 합계';
  document.getElementById('m-expense').textContent=fmt(exp)+'원';
  document.getElementById('m-expense-sub').textContent=d.txns.length+'건 지출';
  document.getElementById('m-savings').textContent=fmt(sav)+'원';
  document.getElementById('m-savings-sub').textContent=sav>=0?'저축 가능':'적자 주의';
  document.getElementById('m-rate').textContent=(rate*100).toFixed(1)+'%';

  const cats=getCats(currentMonth);
  const sorted=Object.entries(cats).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
  const maxV=Math.max(...sorted.map(([,v])=>v),1);
  const cl=document.getElementById('catList');cl.innerHTML='';
  sorted.forEach(([name,val])=>{
    const item=document.createElement('div');item.className='cat-item';
    item.innerHTML=`<span class="cat-name">${name}</span><div class="cat-bar-wrap"><div class="cat-bar" style="width:0%;background:${CAT_COLORS[name]||'#7c6af7'}"></div></div><span class="cat-val">${fmt(val)}원</span>`;
    cl.appendChild(item);setTimeout(()=>item.querySelector('.cat-bar').style.width=(val/maxV*100)+'%',50);
  });

  if(donutChart)donutChart.destroy();
  if(sorted.length){
    donutChart=new Chart(document.getElementById('donutChart').getContext('2d'),{type:'doughnut',data:{labels:sorted.map(([n])=>n),datasets:[{data:sorted.map(([,v])=>v),backgroundColor:sorted.map(([n])=>CAT_COLORS[n]||'#7c6af7'),borderWidth:0,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.label}: ${c.raw.toLocaleString()}원`}}},cutout:'68%'}});
  }
  renderTxns();
}

function renderTxns(){
  const txns=DATA.months[currentMonth].txns;
  document.getElementById('txnCount').textContent=txns.length?`(${txns.length}건)`:'';
  const tb=document.getElementById('txnBody');tb.innerHTML='';
  if(!txns.length){tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--muted);padding:32px">아직 지출 내역이 없습니다 — 위의 지출 추가 버튼을 눌러보세요</td></tr>';return;}
  txns.forEach((t,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td style="color:var(--muted);font-family:'DM Mono',monospace">${t.no}</td><td class="editable-cell" style="font-family:'DM Mono',monospace;color:var(--muted)">${t.date}</td><td class="editable-cell">${t.desc}</td><td><span class="${tagClass(t.cat)}">${t.cat}</span></td><td class="amt-cell editable-cell">-${t.amt.toLocaleString()}원</td><td class="action-cell"><button class="btn-edit-row">수정</button><button class="btn-del-row">삭제</button></td>`;
    tr.querySelectorAll('.editable-cell').forEach(td=>td.addEventListener('click',()=>openEditModal(i)));
    tr.querySelector('.btn-edit-row').addEventListener('click',()=>openEditModal(i));
    tr.querySelector('.btn-del-row').addEventListener('click',()=>delTxn(i));
    tb.appendChild(tr);
  });
}

function updateIncome(month,key,val){DATA.months[month].income[key]=parseInt(val)||0;renderMonthly();toast('소득이 수정됐어요 ✓');}
function addIncomeItem(month){
  const name=prompt('소득 항목 이름 (예: 배당금)');if(!name)return;
  const val=parseInt(prompt(`${name} 금액 (원)`)||'0')||0;
  DATA.months[month].income[name]=val;renderMonthly();toast('소득 항목이 추가됐어요 ✓');
}
function delTxn(i){if(!confirm('이 내역을 삭제할까요?'))return;DATA.months[currentMonth].txns.splice(i,1);renumber();renderMonthly();toast('삭제됐어요');}
function renumber(){DATA.months[currentMonth].txns.forEach((t,i)=>t.no=i+1);}

function openAddModal(){
  editIdx=null;document.getElementById('modalTitle').textContent='지출 추가';
  ['f-date','f-desc','f-amt'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-cat').value='장보기';
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-date').focus(),100);
}
function openEditModal(i){
  editIdx=i;const t=DATA.months[currentMonth].txns[i];
  document.getElementById('modalTitle').textContent='지출 수정';
  document.getElementById('f-date').value=t.date;document.getElementById('f-desc').value=t.desc;
  document.getElementById('f-amt').value=t.amt;document.getElementById('f-cat').value=t.cat;
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-desc').focus(),100);
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function saveModal(){
  const date=document.getElementById('f-date').value.trim();
  const desc=document.getElementById('f-desc').value.trim();
  const amt=parseInt(document.getElementById('f-amt').value)||0;
  const cat=document.getElementById('f-cat').value;
  if(!desc||!amt){alert('내용과 금액을 입력해주세요');return;}
  if(editIdx===null){
    const txns=DATA.months[currentMonth].txns;
    txns.push({no:txns.length+1,date:date||currentMonth.slice(0,-1)+'/',desc,amt,cat});
    toast('지출이 추가됐어요 ✓');
  } else {
    const t=DATA.months[currentMonth].txns[editIdx];
    t.date=date;t.desc=desc;t.amt=amt;t.cat=cat;toast('수정됐어요 ✓');
  }
  closeModal();renderMonthly();
}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

function renderAnnual(){
  let totInc=0,totExp=0,active=0,rSum=0;
  MONTH_LIST.forEach(m=>{const i=totalIncome(m),e=totalExpense(m);totInc+=i;if(e>0){totExp+=e;active++;rSum+=e/i;}});
  document.getElementById('a-income').textContent=fmt(totInc)+'원';
  document.getElementById('a-expense').textContent=fmt(totExp)+'원';
  document.getElementById('a-esub').textContent=active+'개월 기록';
  document.getElementById('a-savings').textContent=fmt(totInc-totExp)+'원';
  document.getElementById('a-rate').textContent=active?(rSum/active*100).toFixed(1)+'%':'—';

  if(barChart)barChart.destroy();
  barChart=new Chart(document.getElementById('barChart').getContext('2d'),{type:'bar',data:{labels:MONTH_LIST,datasets:[{label:'소득',data:MONTH_LIST.map(m=>totalIncome(m)),backgroundColor:'rgba(106,247,184,0.3)',borderColor:'rgba(106,247,184,0.8)',borderWidth:1,borderRadius:4},{label:'지출',data:MONTH_LIST.map(m=>totalExpense(m)),backgroundColor:'rgba(247,106,106,0.3)',borderColor:'rgba(247,106,106,0.8)',borderWidth:1,borderRadius:4}]},options:{responsive:true,plugins:{legend:{labels:{color:'#6b6b80'}},tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${c.raw.toLocaleString()}원`}}},scales:{x:{ticks:{color:'#6b6b80'},grid:{color:'rgba(42,42,56,0.6)'}},y:{ticks:{color:'#6b6b80',callback:v=>fmt(v)},grid:{color:'rgba(42,42,56,0.6)'}}}}});

  const grid=document.getElementById('annualGrid');grid.innerHTML='';
  MONTH_LIST.forEach(m=>{
    const inc=totalIncome(m),exp=totalExpense(m),hasData=exp>0,rate=inc>0?exp/inc:0;
    const card=document.createElement('div');card.className='month-card'+(hasData?' has-data':'');
    card.innerHTML=`<div class="mc-month">${m}</div><div class="mc-income">소득 ${fmt(inc)}원</div>${hasData?`<div class="mc-expense">지출 ${fmt(exp)}원</div>`:`<div class="mc-expense" style="color:var(--muted)">지출 없음</div>`}<div class="mc-rate">지출비율 ${(rate*100).toFixed(1)}%</div><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(rate*100,100)}%"></div></div>`;
    card.onclick=()=>{selectMonth(m);showPage('monthly');};
    grid.appendChild(card);
  });
}

function renderAssets(){
  const assets=DATA.assets,total=Object.values(assets).reduce((a,b)=>a+b,0);
  const grid=document.getElementById('assetGrid');grid.innerHTML='';
  Object.entries(assets).forEach(([k,v])=>{
    const col=ASSET_COLORS[k]||'var(--accent)';
    const card=document.createElement('div');card.className='asset-card';
    card.innerHTML=`<div class="ac-type">${ASSET_ICONS[k]||''} ${k}</div><div class="ac-val" style="color:${col}" title="클릭해서 수정">${fmtFull(v)}</div><div class="ac-sub">${(v/total*100).toFixed(1)}% · 클릭하면 수정</div>`;
    card.querySelector('.ac-val').onclick=function(){editAsset(k,this);};
    grid.appendChild(card);
  });
  const total2=Object.values(DATA.assets).reduce((a,b)=>a+b,0);
  const tot=document.createElement('div');tot.className='asset-card';tot.style.cssText='border-color:var(--accent);background:rgba(124,106,247,0.06)';
  tot.innerHTML=`<div class="ac-type">✨ 총 자산</div><div class="ac-val" style="color:var(--accent)">${fmtFull(total2)}</div><div class="ac-sub">100%</div>`;
  grid.appendChild(tot);

  if(assetChart)assetChart.destroy();
  const keys=Object.keys(DATA.assets);
  assetChart=new Chart(document.getElementById('assetChart').getContext('2d'),{type:'bar',data:{labels:keys,datasets:[{data:keys.map(k=>DATA.assets[k]),backgroundColor:keys.map(k=>ASSET_COLORS[k]||'#7c6af7'),borderWidth:0,borderRadius:8}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${c.raw.toLocaleString()}원`}}},scales:{x:{ticks:{color:'#6b6b80',callback:v=>fmt(v)},grid:{color:'rgba(42,42,56,0.5)'}},y:{ticks:{color:'#e8e8f0',font:{size:13,family:'Noto Sans KR'}},grid:{display:false}}}}});
}

function editAsset(key,el){
  const cur=DATA.assets[key];
  const input=document.createElement('input');
  input.className='ac-input';input.type='number';input.value=cur;input.style.color=el.style.color;
  el.replaceWith(input);input.focus();input.select();
  const save=()=>{DATA.assets[key]=parseInt(input.value)||0;renderAssets();toast(`${key} 자산이 수정됐어요 ✓`);};
  input.onblur=save;input.onkeydown=e=>{if(e.key==='Enter')save();if(e.key==='Escape')renderAssets();};
}

function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  ['monthly','annual','assets'].forEach((p,i)=>{if(p===page)document.querySelectorAll('.nav-btn')[i].classList.add('active');});
  if(page==='annual')renderAnnual();
  if(page==='assets')renderAssets();
}

buildTabs();renderMonthly();
</script>
</body>
</html>
